<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="⚽ Tracker">
<title>⚽ Fútbol Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALZzNue6CmSP0mCQzjwB-HjxQZNfyEePc",
    authDomain: "benicio-futbol-tracker.firebaseapp.com",
    projectId: "benicio-futbol-tracker",
    storageBucket: "benicio-futbol-tracker.firebasestorage.app",
    messagingSenderId: "879527474225",
    appId: "1:879527474225:web:b3ddf0222a46b31bb4d110"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "tracker", "shared");

  // Expose to global scope for the main script
  window._fbSave = async (data) => {
    try { await setDoc(REF, { records: JSON.stringify(data) }); } catch(e) { console.warn("FB save error", e); }
  };

  window._fbListen = (callback) => {
    onSnapshot(REF, (snap) => {
      if (snap.exists()) {
        try { callback(JSON.parse(snap.data().records)); } catch {}
      }
    });
  };

  window._fbReady = true;
  document.dispatchEvent(new Event("fb-ready"));
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:      #080c10;
    --surf:    #0f1923;
    --card:    #111d2a;
    --card2:   #162032;
    --border:  #1e2d3d;
    --green:   #22c55e;
    --green2:  #16a34a;
    --orange:  #f97316;
    --blue:    #3b82f6;
    --purple:  #a855f7;
    --red:     #ef4444;
    --yellow:  #eab308;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --fh: 'Bebas Neue', sans-serif;
    --fb: 'DM Sans', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--fb);
    height: 100%;
    overflow: hidden;
  }

  /* ── APP SHELL ─────────────────────────────────────────── */
  #app { height: 100vh; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }

  /* ── HEADER ─────────────────────────────────────────────── */
  .hdr {
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    padding-top: calc(12px + env(safe-area-inset-top, 0px));
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .hdr-left { display: flex; align-items: center; gap: 10px; }
  .hdr-ball { font-size: 26px; line-height: 1; }
  .hdr-title { font-family: var(--fh); font-size: 22px; color: var(--green); letter-spacing: 1px; line-height: 1; }
  .hdr-sub   { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .hdr-ring  {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .hdr-ring svg { position: absolute; top: 0; left: 0; width: 44px; height: 44px; transform: rotate(-90deg); }
  .hdr-ring-pct { font-family: var(--fh); font-size: 13px; color: var(--green); position: relative; z-index: 1; }

  /* ── SCROLL AREA ─────────────────────────────────────────── */
  .scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(68px + var(--safe-bottom));
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── BOTTOM NAV ─────────────────────────────────────────── */
  .nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--surf); border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; padding: 10px 0 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: var(--fb); font-size: 9px;
    text-transform: uppercase; letter-spacing: .5px; transition: color .15s;
  }
  .nav-btn.on { color: var(--green); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ── SECTION TITLE ─────────────────────────────────────── */
  .stitle {
    font-family: var(--fh); font-size: 22px; letter-spacing: 1px;
    padding: 18px 16px 10px;
  }

  /* ── CARD ───────────────────────────────────────────────── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px;
  }

  /* ════════════════════════════════════════════════════════
     TAB: INICIO
  ════════════════════════════════════════════════════════ */
  .hero {
    background: linear-gradient(145deg, #0a1f15 0%, #0d1a2a 100%);
    padding: 18px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .hero-name { font-family: var(--fh); font-size: 30px; color: var(--green); line-height: 1; }
  .hero-info { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-top: 4px; }
  .hero-prog {
    margin-top: 14px;
    background: var(--border); border-radius: 99px; height: 8px; overflow: hidden;
  }
  .hero-prog-fill {
    height: 100%; background: linear-gradient(90deg, var(--green2), var(--green));
    border-radius: 99px; transition: width .6s ease;
  }
  .hero-prog-lbl {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--muted); margin-top: 5px;
  }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px 16px; }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 8px; text-align: center;
  }
  .stat-n { font-family: var(--fh); font-size: 28px; }
  .stat-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

  .bloque-legend { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 14px; }
  .b-pill {
    font-size: 9px; padding: 3px 10px; border-radius: 99px;
    border: 1px solid; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  }

  .inicio-mes-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .inicio-mes {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: border-color .15s;
    -webkit-user-select: none; user-select: none;
  }
  .inicio-mes:active { border-color: var(--green); background: var(--card2); }
  .im-circle {
    width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .im-circle svg { position: absolute; top: 0; left: 0; width: 50px; height: 50px; transform: rotate(-90deg); }
  .im-pct { font-family: var(--fh); font-size: 15px; position: relative; z-index: 1; }
  .im-info { flex: 1; min-width: 0; }
  .im-mes  { font-weight: 700; font-size: 14px; }
  .im-obj  { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .im-bloque { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }
  .im-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }

  /* ════════════════════════════════════════════════════════
     TAB: CALENDARIO (semanas de un mes)
  ════════════════════════════════════════════════════════ */
  .cal-mes-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 8px;
  }
  .cal-mes-name { font-family: var(--fh); font-size: 22px; }
  .cal-nav-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .15s;
  }
  .cal-nav-btn:active { background: var(--card2); }

  .cal-bloque-badge {
    margin: 0 16px 12px; padding: 8px 12px; border-radius: 10px; border: 1px solid;
    font-size: 11px; font-weight: 600;
  }
  .cal-obj { font-size: 10px; opacity: .75; margin-top: 2px; }

  .sem-tabs { display: flex; gap: 6px; padding: 0 16px 12px; }
  .sem-tab {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 11px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all .15s;
  }
  .sem-tab.on { background: var(--green); border-color: var(--green); color: #000; }

  .dias-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .dia-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  }
  .dia-done-btn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--border); background: var(--card2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s;
  }
  .dia-done-btn.done { background: var(--green); border-color: var(--green); }
  .dia-done-btn svg { width: 18px; height: 18px; }
  .dia-info { flex: 1; min-width: 0; }
  .dia-name { font-weight: 700; font-size: 14px; }
  .dia-type { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .dia-nota-badge {
    font-size: 9px; padding: 2px 7px; border-radius: 99px;
    background: var(--card2); border: 1px solid var(--border); color: var(--muted);
    margin-top: 3px; display: inline-block;
  }
  .dia-edit-btn {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card2); color: var(--muted); font-size: 11px; font-weight: 600;
    cursor: pointer; flex-shrink: 0; transition: all .15s;
  }
  .dia-edit-btn:active { background: var(--card); color: var(--text); }

  /* ════════════════════════════════════════════════════════
     TAB: PROGRESO
  ════════════════════════════════════════════════════════ */
  .prog-global {
    margin: 0 16px 14px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  }
  .prog-g-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .prog-g-title { font-family: var(--fh); font-size: 18px; }
  .prog-g-pct { font-family: var(--fh); font-size: 36px; color: var(--green); line-height: 1; }
  .prog-bar { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
  .prog-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--green2), var(--green)); transition: width .6s ease; }
  .prog-g-sub { font-size: 10px; color: var(--muted); margin-top: 6px; }

  .prog-mes-list { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .prog-mes-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
  }
  .pmr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .pmr-name { font-weight: 600; font-size: 13px; }
  .pmr-pct  { font-family: var(--fh); font-size: 16px; }
  .pmr-bar  { background: var(--border); border-radius: 99px; height: 5px; overflow: hidden; }
  .pmr-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .pmr-sub  { font-size: 9px; color: var(--muted); margin-top: 4px; }

  /* ════════════════════════════════════════════════════════
     TAB: CARGAS
  ════════════════════════════════════════════════════════ */
  .cargas-intro { padding: 0 16px 12px; font-size: 12px; color: var(--muted); }

  .cargas-mes-sel {
    display: flex; gap: 6px; padding: 0 16px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .cargas-mes-sel::-webkit-scrollbar { display: none; }
  .cms-btn {
    flex-shrink: 0; padding: 6px 12px; border-radius: 99px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all .15s;
  }
  .cms-btn.on { background: var(--green); border-color: var(--green); color: #000; }

  .cargas-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .carga-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px;
  }
  .cc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cc-dia  { font-weight: 700; font-size: 13px; }
  .cc-sem  { font-size: 10px; color: var(--muted); }
  .cc-nota { font-size: 11px; color: var(--muted); margin-bottom: 8px; padding: 6px 10px; background: var(--card2); border-radius: 8px; }
  .cc-cargas { display: flex; flex-direction: column; gap: 4px; }
  .cc-carga-row { display: flex; justify-content: space-between; align-items: center; }
  .cc-ej   { font-size: 11px; color: var(--muted); }
  .cc-val  { font-size: 12px; font-weight: 700; color: var(--orange); }

  /* ════════════════════════════════════════════════════════
     MODAL
  ════════════════════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--surf); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 430px;
    padding: 20px 16px calc(20px + var(--safe-bottom));
    max-height: 85vh; overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .modal::-webkit-scrollbar { display: none; }
  .modal-title { font-family: var(--fh); font-size: 20px; margin-bottom: 4px; }
  .modal-sub   { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .modal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  .modal-input {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card2);
    color: var(--text); font-family: var(--fb); font-size: 14px;
    outline: none;
  }
  .modal-input:focus { border-color: var(--green); }
  textarea.modal-input { resize: none; min-height: 70px; }
  .carga-field { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .carga-field label { font-size: 12px; flex: 1; color: var(--text); }
  .carga-field input {
    width: 90px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card2);
    color: var(--text); font-family: var(--fb); font-size: 14px; text-align: center;
    outline: none;
  }
  .carga-field input:focus { border-color: var(--orange); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-family: var(--fb); font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 14px; border-radius: 12px; border: none;
    background: var(--green); color: #000; font-family: var(--fb); font-size: 15px; font-weight: 700;
    cursor: pointer;
  }
  .btn-save:active { background: var(--green2); }

  /* ── Misc ──────────────────────────────────────────────── */
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13px; }
  .spacer { height: 10px; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-ball">⚽</div>
      <div>
        <div class="hdr-title">FÚTBOL TRACKER</div>
        <div class="hdr-sub" id="sync-badge" style="color:#eab308">🟡 Conectando…</div>
      </div>

    <div class="hdr-ring">
      <svg viewBox="0 0 44 44">

      <span class="hdr-ring-pct" id="ring-pct">0%</span>

  <div class="scroll" id="scroll-area">

  </div>

  <nav class="nav">

      Semanas
    </button>
    <button class="nav-btn" onclick="showTab('prog')" id="nav-prog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>
      Progreso
    </button>
    <button class="nav-btn" onclick="showTab('cargas')" id="nav-cargas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M6 12h12M3 7h3M3 17h3M18 7h3M18 17h3"/></svg>

      Lunchera
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub"  id="modal-sub"></div>
    <div class="modal-label">Nota de sesión</div>
    <textarea class="modal-input" id="modal-nota" placeholder="¿Cómo salió? ¿Alguna observación?"></textarea>
    <div class="modal-label">Cargas usadas</div>
    <div id="modal-cargas-fields"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalBtn()">Cancelar</button>
      <button class="btn-save"   onclick="saveModal()">Guardar ✓</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

// ─── STATE ───────────────────────────────────────────────────────────────────
let records = {};   // "mIdx-sem-dIdx" → {done, nota, cargas:{ej:val}}
let curTab  = 'inicio';
let calMes  = 0;
let calSem  = 1;
let modalKey = null;

const SK = 'futbol-tracker-v2';

// ─── SYNC STATE ───────────────────────────────────────────────────────────────
let syncStatus = 'connecting'; // 'connecting' | 'online' | 'offline'
let saveTimeout = null;

function updateSyncBadge() {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  if (syncStatus === 'online')      { el.textContent = '🟢 Sincronizado'; el.style.color = '#22c55e'; }
  else if (syncStatus === 'offline'){ el.textContent = '🔴 Sin conexión'; el.style.color = '#ef4444'; }
  else                               { el.textContent = '🟡 Conectando…';  el.style.color = '#eab308'; }
}

function loadData() {
  try { const d = localStorage.getItem(SK); if(d) records = JSON.parse(d); } catch{}
}

function saveData() {
  // Always save locally first
  try { localStorage.setItem(SK, JSON.stringify(records)); } catch{}
  // Debounce Firebase save
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if (window._fbSave) {
      try {
        await window._fbSave(records);
        syncStatus = 'online';
      } catch {
        syncStatus = 'offline';
      }
      updateSyncBadge();
    }
  }, 800);
}

loadData();

// Start Firebase listener when ready
function startFirebaseSync() {
  if (!window._fbListen) return;
  syncStatus = 'connecting';
  updateSyncBadge();
  window._fbListen((remoteRecords) => {
    // Merge: remote wins for keys it has, keep local for rest
    records = { ...records, ...remoteRecords };
    try { localStorage.setItem(SK, JSON.stringify(records)); } catch{}
    syncStatus = 'online';
    updateSyncBadge();
    render();
  });
}

if (window._fbReady) {
  startFirebaseSync();
} else {
  document.addEventListener('fb-ready', startFirebaseSync);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rk(mIdx,sem,dIdx){ return `${mIdx}-${sem}-${dIdx}`; }

function mesStats(mIdx){
  const m = PLAN[mIdx];
  const total = m.semanas * m.sesiones.length;
  let done = 0;
  for(let s=1;s<=m.semanas;s++)
    m.sesiones.forEach((_,dIdx)=>{ if(records[rk(mIdx,s,dIdx)]?.done) done++; });
  return {total, done, pct: total ? Math.round(done/total*100) : 0};
}

function globalStats(){
  let total=0, done=0;
  PLAN.forEach((_,i)=>{const s=mesStats(i);total+=s.total;done+=s.done;});
  return {total, done, pct: total ? Math.round(done/total*100) : 0};
}

function updateRing(){
  const g = globalStats();
  const circ = 2 * Math.PI * 18; // r=18 → ~113.1
  const off  = circ - (circ * g.pct / 100);
  const el   = document.getElementById('ring-circle');
  const lbl  = document.getElementById('ring-pct');
  if(el)  el.style.strokeDashoffset = off;
  if(lbl) lbl.textContent = g.pct + '%';
}

function pctColor(pct){
  if(pct >= 80) return '#22c55e';
  if(pct >= 50) return '#eab308';
  if(pct > 0)   return '#f97316';
  return '#64748b';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(tab){
  curTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('nav-'+tab).classList.add('on');
  render();
}

// ─── RENDER ROUTER ────────────────────────────────────────────────────────────
function render(){
  const el = document.getElementById('scroll-area');
  if(curTab === 'inicio')  el.innerHTML = renderInicio();
  if(curTab === 'cal')     el.innerHTML = renderCal();
  if(curTab === 'prog')    el.innerHTML = renderProg();
  if(curTab === 'cargas')  el.innerHTML = renderCargas();
  if(curTab === 'lunch')   el.innerHTML = renderLunch();
  updateRing();
  el.scrollTop = 0;
}

// ─── CALENDARIO ───────────────────────────────────────────────────────────────
function renderCal(){
  const m = PLAN[calMes];

  // sem tabs
  let semTabs = '';
  for(let s=1;s<=m.semanas;s++){
    let semDone=0;
    m.sesiones.forEach((_,dIdx)=>{ if(records[rk(calMes,s,dIdx)]?.done) semDone++; });
    const allDone = semDone === m.sesiones.length;
    semTabs += `<div class="sem-tab ${calSem===s?'on':''}" onclick="setSem(${s})">
      Sem ${s}${allDone?' ✓':''}
    </div>`;
  }

  // días
  let diasHtml = '';
  m.sesiones.forEach((dia, dIdx) => {
    const k    = rk(calMes, calSem, dIdx);
    const rec  = records[k] || {};
    const done = !!rec.done;
    const tipo = m.tipos[dIdx];
    const notaPreview = rec.nota ? `<span class="dia-nota-badge">📝 ${rec.nota.slice(0,22)}${rec.nota.length>22?'…':''}</span>` : '';
    const checkSvg = done
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`;

    diasHtml += `
    <div class="dia-row">
      <button class="dia-done-btn ${done?'done':''}" onclick="toggleDone(${calMes},${calSem},${dIdx})">
        ${checkSvg}
      </button>
      <div class="dia-info">
        <div class="dia-name">${dia}</div>
        <div class="dia-type" style="color:${done?'var(--green)':'var(--muted)'}">${tipo}</div>
        ${notaPreview}
      </div>
      <button class="dia-edit-btn" onclick="openModal(${calMes},${calSem},${dIdx})">
        Detalle
      </button>
    </div>`;
  });

  // progress de este mes
  const ms = mesStats(calMes);

  return `
  <div class="cal-mes-nav">
    <button class="cal-nav-btn" onclick="prevMes()">‹</button>
    <div>
      <div class="cal-mes-name">${m.mes}</div>
    </div>
    <button class="cal-nav-btn" onclick="nextMes()">›</button>
  </div>

  <div class="cal-bloque-badge" style="color:${m.color};border-color:${m.color};background:${m.color}18">
    <div style="font-weight:700;font-size:11px">${m.bloque} — ${ms.pct}% completado (${ms.done}/${ms.total} sesiones)</div>
    <div class="cal-obj">${m.objetivo}</div>
  </div>

  <div class="sem-tabs">${semTabs}</div>
  <div class="dias-list">${diasHtml}</div>
  <div class="spacer"></div>`;
}

function prevMes(){ calMes = Math.max(0, calMes-1); calSem=1; render(); }
function nextMes(){ calMes = Math.min(PLAN.length-1, calMes+1); calSem=1; render(); }
function setSem(s){ calSem = s; render(); }

function toggleDone(mIdx, sem, dIdx){
  const k = rk(mIdx,sem,dIdx);
  records[k] = { ...(records[k]||{}), done: !(records[k]?.done) };
  saveData(); render();
}

// ─── CARGAS ───────────────────────────────────────────────────────────────────
function renderCargas(){
  // mes selector
  let selHtml = '';
  PLAN.forEach((m,i) => {
    selHtml += `<button class="cms-btn ${i===calMes?'on':''}" onclick="setCarMes(${i})">${m.mes.split(' ')[0]}</button>`;
  });

  // recopilar entradas con cargas o notas para el mes seleccionado
  const m = PLAN[calMes];
  let cards = '';
  let found = false;

  for(let s=1; s<=m.semanas; s++){
    m.sesiones.forEach((dia, dIdx) => {
      const k   = rk(calMes, s, dIdx);
      const rec = records[k];
      if(!rec || (!rec.nota && (!rec.cargas || Object.keys(rec.cargas).length===0))) return;
      found = true;
      let cargasHtml = '';
      if(rec.cargas){
        Object.entries(rec.cargas).forEach(([ej,val]) => {
          if(val) cargasHtml += `<div class="cc-carga-row"><span class="cc-ej">${ej}</span><span class="cc-val">${val}</span></div>`;
        });
      }
      cards += `
      <div class="carga-card">
        <div class="cc-top">
          <div class="cc-dia">${dia} — Semana ${s}</div>
          <div class="cc-sem" style="color:${rec.done?'var(--green)':'var(--muted)'}">
            ${rec.done ? '✓ Completado' : '— Pendiente'}
          </div>
        </div>
        ${rec.nota ? `<div class="cc-nota">📝 ${rec.nota}</div>` : ''}
        ${cargasHtml ? `<div class="cc-cargas">${cargasHtml}</div>` : ''}
      </div>`;
    });
  }

  if(!found) cards = `<div class="empty">Sin registros aún en este mes.<br>Completá sesiones y agregá cargas desde la pestaña Semanas.</div>`;

  return `
  <div class="stitle">CARGAS Y NOTAS</div>
  <p class="cargas-intro">Historial de pesos y observaciones por mes.</p>
  <div class="cargas-mes-sel">${selHtml}</div>
  <div class="cargas-list">${cards}</div>
  <div class="spacer"></div>`;
}

        const savedVal = rec.cargas?.[ej.nombre] || '';
        fieldsHtml += `
        <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700">${ej.nombre}</div>
              <div style="font-size:10px;color:var(--muted);margin-top:1px">${ej.desc} · ${ej.series}</div>
            </div>
            <div style="font-size:9px;color:var(--orange);background:#1c0a00;padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0">${sugerida}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:10px;color:var(--muted);flex-shrink:0">Registrá:</span>
            <input type="text" placeholder="Lo que usaste hoy" value="${savedVal}"
              data-ej="${ej.nombre}" inputmode="text"
              style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
                     background:var(--card);color:var(--text);font-family:var(--fb);font-size:13px;outline:none">
          </div>
        </div>`;
      });
    });

    // Vuelta a la calma
    fieldsHtml += `<div style="background:#0a1020;border:1px solid #3b82f633;border-radius:10px;padding:10px 12px;margin-top:4px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#3b82f6;margin-bottom:4px">🧘 VUELTA A LA CALMA</div>
      <div style="font-size:11px;color:var(--muted)">${rutina.vuelta}</div>
    </div>`;

  } else {
    // Sesión de club — solo nota
    fieldsHtml = `<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;color:var(--muted);font-size:12px">
      Entrenamiento del club — registrá cómo se sintió la sesión en la nota.
    </div>`;
  }

  document.getElementById('modal-cargas-fields').innerHTML = fieldsHtml;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e){
  if(e.target.id === 'modal-overlay') closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('modal-overlay').style.display = 'none';
  modalKey = null;
}

function saveModal(){
  if(!modalKey) return;
  const {mIdx, sem, dIdx} = modalKey;
  const k    = rk(mIdx, sem, dIdx);
  const nota = document.getElementById('modal-nota').value.trim();
  const cargas = {};
  document.querySelectorAll('#modal-cargas-fields input').forEach(inp => {
    const v = inp.value.trim();
    if(v) cargas[inp.dataset.ej] = v;
  });
  records[k] = { ...(records[k]||{}), nota, cargas };
  saveData();
  closeModalBtn();
  render();
}

// ─── RENDER LUNCHERA ─────────────────────────────────────────────────────────
function renderLunch(){
  const sem  = LUNCHERA.semanas[lunchSemana];
  const dia  = sem.dias[lunchDia];

  // Selector de semana
  let semSel = '';
  LUNCHERA.semanas.forEach((s,i) => {
    semSel += `<button onclick="setLunchSem(${i})"
      style="flex:1;padding:8px 4px;border-radius:10px;border:1px solid ${i===lunchSemana?'var(--green)':'var(--border)'};
      background:${i===lunchSemana?'var(--green)':'var(--card)'};
      color:${i===lunchSemana?'#000':'var(--muted)'};font-size:11px;font-weight:700;cursor:pointer">${s.label}</button>`;
  });

  // Selector de día
  const dias = ['Lun','Mar','Mié','Jue','Vie'];
  let diaSel = '';
  sem.dias.forEach((d,i) => {
    const activo = i === lunchDia;
    const entrena = d.entrena;
    diaSel += `<button onclick="setLunchDia(${i})"
      style="flex:1;padding:10px 4px;border-radius:12px;
      border:1px solid ${activo ? (entrena?'var(--orange)':'var(--green)') : 'var(--border)'};
      background:${activo ? (entrena?'#1c0a00':'#052e16') : 'var(--card)'};
      color:${activo ? (entrena?'var(--orange)':'var(--green)') : 'var(--muted)'};
      font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px">
      <span>${dias[i]}</span>
      ${entrena ? '<span style="font-size:8px">⚽</span>' : '<span style="font-size:8px">—</span>'}
    </button>`;
  });

  const entrenaBadge = dia.entrena
    ? `<div style="background:#1c0a00;border:1px solid var(--orange);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:var(--orange);font-weight:600">
        ⚽ Día de entrenamiento — almuerzo con más hidratos para rendir en el club
      </div>`
    : `<div style="background:#052e16;border:1px solid var(--green);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:var(--green);font-weight:600">
        💪 Día sin entreno — almuerzo equilibrado, sin cargar de más
      </div>`;

  const block = (emoji, titulo, contenido, color) => `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:${color};margin-bottom:8px">${emoji} ${titulo}</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${contenido.titulo}</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.5">${contenido.desc}</div>
    </div>`;

  return `
  <div style="padding:14px 16px 8px">
    <div style="font-family:var(--fh);font-size:22px;letter-spacing:1px">🎒 LUNCHERA</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Plan semanal · Almuerzo + 3 recreos · Rota cada semana</div>
  </div>

  <div style="display:flex;gap:6px;padding:0 16px 12px">${semSel}</div>
  <div style="display:flex;gap:6px;padding:0 16px 12px">${diaSel}</div>

  <div style="padding:0 16px">
    ${entrenaBadge}
    ${block('🍽️','ALMUERZO (con microondas)', dia.almuerzo, '#3b82f6')}
    ${block('☀️','RECREO 1 — Liviano', dia.r1, '#22c55e')}
    ${block('🌤️','RECREO 2 — Sustancioso', dia.r2, '#eab308')}
    ${block('🌙','RECREO 3 — Gustito rico', dia.r3, '#f97316')}

    <div style="background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:4px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px">💧 HIDRATACIÓN</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.6">
        Siempre mandar <strong style="color:var(--text)">600 ml de agua</strong> en botellita. Los días de entreno (Mar/Mié/Jue) agregar una
        <strong style="color:var(--text)">segunda botella</strong> o una bebida isotónica casera (agua + limón + pizca de sal + miel).
      </div>
    </div>
  </div>
  <div style="height:16px"></div>`;
}

function setLunchSem(i){ lunchSemana = i; render(); }
function setLunchDia(i){ lunchDia    = i; render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
